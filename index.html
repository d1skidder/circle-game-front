<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcne.io</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0614; }

    /* ── JOIN SCREEN ── */
    #joinScreen {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(to bottom right, #0b0614, #1c0f29);
      display: flex; align-items: center; justify-content: center;
      font-family: 'IM Fell English SC', serif;
    }
    .join-container {
      text-align: center;
      background: radial-gradient(ellipse at top, #2e2145 0%, #1a0e28 100%);
      padding: 48px 56px; border-radius: 18px;
      border: 2px solid #4f337a;
      box-shadow: 0 0 40px rgba(177,135,255,0.3);
    }
    .join-container h1 { color: #e0d1ff; font-size: 52px; margin-bottom: 4px; letter-spacing: 6px; }
    .join-container .subtitle { color: #7a5a99; font-size: 12px; letter-spacing: 4px; margin-bottom: 32px; }
    #name-input {
      padding: 12px 20px; width: 260px; font-size: 18px;
      border-radius: 8px; border: none;
      background-color: #f4ecff; color: #1a0e28;
      font-family: inherit; display: block; margin: 0 auto 16px;
    }
    #name-input::placeholder { color: #888; }
    #join-btn {
      padding: 10px 32px; font-size: 18px; border: none;
      border-radius: 8px; background-color: #7c4dff; color: white;
      cursor: pointer; font-family: inherit;
      transition: background-color 0.2s, box-shadow 0.2s;
      display: block; margin: 0 auto 28px;
    }
    #join-btn:hover { background-color: #693ee8; box-shadow: 0 0 16px #b896ff; }
    #join-btn:disabled { opacity: 0.35; cursor: default; box-shadow: none; }

    .class-selector { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
    .class-card {
      width: 100px; border-radius: 12px;
      border: 2px solid #4f337a; background-color: #1c1329;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      overflow: hidden;
    }
    .class-card:hover { box-shadow: 0 0 10px rgba(200,170,255,0.5); transform: translateY(-2px); }
    .class-card.selected {
      transform: scale(1.12) translateY(-4px);
      box-shadow: 0 0 18px var(--glow);
      border-color: var(--glow);
      background-color: #2e1a45;
    }
    .class-card .icon {
      font-size: 36px; height: 70px;
      display: flex; align-items: center; justify-content: center;
    }
    .class-card .label {
      font-size: 11px; letter-spacing: 2px;
      color: var(--glow); padding: 6px 4px;
      font-family: 'IM Fell English SC', serif;
      border-top: 1px solid #4f337a;
    }

    /* ── GAME SCREEN ── */
    #gameScreen { position: fixed; inset: 0; display: none; }
    #gameScreen canvas { display: block; }

    /* ── DEBUG OVERLAY ── */
    #debug-overlay {
      position: fixed; top: 10px; left: 10px;
      z-index: 300; display: none;
      flex-direction: column; align-items: flex-start; gap: 5px;
      pointer-events: none;
    }
    .debug-line {
      background: rgba(0,0,0,0.7); border-radius: 6px;
      padding: 4px 16px; font-family: monospace; font-size: 13px;
      border: 1px solid rgba(255,255,255,0.1); white-space: nowrap;
    }
    .debug-line.ok    { color: #44ee88; border-color: rgba(68,238,136,0.3); }
    .debug-line.warn  { color: #ffcc44; border-color: rgba(255,204,68,0.3); }
    .debug-line.error { color: #ff4455; border-color: rgba(255,68,85,0.3); }
    .debug-line.info  { color: #88aaff; border-color: rgba(136,170,255,0.3); }

    /* ── DEATH SCREEN ── */
    #deathScreen {
      position: fixed; inset: 0; z-index: 200; display: none;
      background: rgba(0,0,0,0.85); flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'IM Fell English SC', serif;
    }
    #deathScreen h2 { color: #cc2244; font-size: 56px; margin-bottom: 12px; letter-spacing: 4px; }
    #deathScreen p  { color: #aaa; font-size: 20px; margin-bottom: 36px; }
    #respawn-btn {
      padding: 12px 44px; font-size: 18px; font-family: inherit;
      border: none; border-radius: 8px; cursor: pointer;
      background: #7c4dff; color: #fff;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #respawn-btn:hover { background: #9b6dff; box-shadow: 0 0 16px #b896ff; }
  </style>
</head>
<body>

<!-- JOIN -->
<div id="joinScreen">
  <div class="join-container">
    <h1>Arcne</h1>
    <div class="subtitle">IO GAME</div>
    <input id="name-input" type="text" placeholder="Your name..." maxlength="16" />
    <button id="join-btn" disabled>Begin</button>
    <div class="class-selector">
      <div class="class-card" data-class="fire" style="--glow:#ff6633">
        <div class="icon">🔥</div><div class="label">FIRE</div>
      </div>
      <div class="class-card" data-class="ice" style="--glow:#88ddff">
        <div class="icon">❄️</div><div class="label">ICE</div>
      </div>
      <div class="class-card" data-class="earth" style="--glow:#aabb66">
        <div class="icon">🪨</div><div class="label">EARTH</div>
      </div>
      <div class="class-card" data-class="blood" style="--glow:#ff3355">
        <div class="icon">🩸</div><div class="label">BLOOD</div>
      </div>
      <div class="class-card" data-class="lightning" style="--glow:#ffee44">
        <div class="icon">⚡</div><div class="label">LIGHTNING</div>
      </div>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen"></div>

<!-- DEBUG OVERLAY -->
<div id="debug-overlay">
  <div class="debug-line info" id="dbg-ws">⬤ WebSocket: connecting...</div>
  <div class="debug-line info" id="dbg-id">⬤ Session ID: waiting...</div>
  <div class="debug-line info" id="dbg-players">⬤ Players: 0</div>
  <div class="debug-line info" id="dbg-ping">⬤ Ping: --ms</div>
</div>

<!-- DEATH -->
<div id="deathScreen">
  <h2>YOU DIED</h2>
  <p id="death-msg"></p>
  <button id="respawn-btn">Play Again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
<script src="game.js"></script>
</body>
</html>
